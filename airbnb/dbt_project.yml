
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'airbnb'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'airbnb'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
models:
  airbnb:
    # El símbolo '+' antes de una configuración indica que esta se aplicará
    # a TODOS los modelos dentro de esta carpeta Y TAMBIÉN a todas las subcarpetas.
    # Sin '+' la configuración solo aplica a los modelos directos de esa carpeta.
    # Ejemplo: +materialized se hereda a src/, dim/, fct/, etc.
    +materialized: view
    
    # EJEMPLO SIN '+':
    # materialized: view  
    # ❌ Solo aplicaría a archivos .sql directamente en models/ (no existen en este proyecto)
    # ❌ NO aplicaría a models/src/src_hosts.sql
    # ❌ NO aplicaría a models/dim/dim_hosts_cleansed.sql
    #
    # CON '+':
    # +materialized: view
    # ✅ Aplica a models/src/src_hosts.sql
    # ✅ Aplica a models/dim/dim_hosts_cleansed.sql
    # ✅ Aplica a todas las subcarpetas (src/, dim/, fct/, etc.)
    
    dim:
      # Aquí se pueden colocar configuraciones específicas para los modelos dentro de la carpeta dim/
      +materialized: table
    src:
      # Aquí se pueden colocar configuraciones específicas para los modelos dentro de la carpeta src/
      +materialized: ephemeral

data_tests:
  # Aquí se pueden colocar configuraciones específicas para los tests de datos
  +store_failures: true # Configuración para almacenar los registros que fallan los tests de datos (crea una tabla de snowflake con los registros que no pasan los tests)
  schema: _data_test_failures # Esquema donde se almacenarán las tablas con los registros que fallan los tests de datos